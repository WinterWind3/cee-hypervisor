version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: cee-postgres
    environment:
      POSTGRES_DB: cee
      POSTGRES_USER: cee
      POSTGRES_PASSWORD: cee123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - cee-network
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: cee-backend
    ports:
      - "8000:8000"
      - "16509:16509"
    environment:
      DATABASE_URL: postgresql://cee:cee123@postgres:5432/cee
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      # Use the host libvirt socket (qemu:///system) when the socket is bind-mounted below.
      # If you prefer TCP access to a remote libvirt use qemu+tcp://... instead.
      LIBVIRT_URI: qemu:///system
      IMAGES_PATH: /var/lib/libvirt/images
      NOVNC_HOST: localhost
      NOVNC_PORT: 6080
      LIBVIRT_VNC_HOST: host.docker.internal
    volumes:
      # Bind host libvirt socket into the container so libvirt client in the container
      # can talk to the host libvirt daemon directly.
      - /run/libvirt/libvirt-sock:/run/libvirt/libvirt-sock
      # Mount host images read-only by default; remove ":ro" if container must write images.
      - /var/lib/libvirt/images:/var/lib/libvirt/images:ro
      - ./backend:/app
    depends_on:
      - postgres
    networks:
      - cee-network
    # It's preferable to run the container without full privileges. If libvirt socket
    # requires access by a specific group (usually GID of 'libvirt' on host), set
    # BACKEND_UID and BACKEND_GID in your environment or .env and the container will
    # run with that uid:gid so it can access the socket without making it world-writable.
    # Example in .env: BACKEND_UID=1000 BACKEND_GID=165
    user: "${BACKEND_UID:-0}:${BACKEND_GID:-0}"
    #privileged: true
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: cee-frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://cee-backend:8000
      REACT_APP_WS_URL: ws://cee-backend:8000
    depends_on:
      - backend
    networks:
      - cee-network
    restart: unless-stopped

  novnc:
    image: theasp/novnc:latest
    container_name: cee-novnc
    ports:
      - "6080:8080"
    depends_on:
      - backend
    networks:
      - cee-network
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: cee-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ericssonsoft.ru
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - cee-network
    restart: unless-stopped

networks:
  cee-network:
    driver: bridge

volumes:
  postgres_data:
