services:
  cee-hypervisor:
    build: .
    container_name: cee-hypervisor
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - LIBVIRT_URI=qemu:///system
    volumes:
      # Mount host libvirt socket so the container can manage VMs on the host
      - /var/run/libvirt/libvirt-sock:/var/run/libvirt/libvirt-sock
      # Mount host OVS control socket so ovs-vsctl commands reach host OVS
      - /var/run/openvswitch:/var/run/openvswitch
      # Persist SQLite database
      - cee_data:/app/backend
    group_add:
      # Numeric GID of the libvirt group on the host — resolved by Ansible and written to .env
      - "${LIBVIRT_GID}"

volumes:
  cee_data:
