services:
  cee-hypervisor:
    build: .
    container_name: cee-hypervisor
    restart: unless-stopped
    # host network mode: container shares host network namespace so that
    # 'ip link show' sees real host NICs (needed for vSwitch uplink discovery)
    # and OVS commands apply to host networking stack.
    network_mode: host
    # ports: directive is ignored with network_mode: host;
    # the app listens directly on host port 8080.
    environment:
      - PORT=8080
      - LIBVIRT_URI=qemu:///system
      - DATABASE_URL=sqlite:////app/data/cee.db
      - PORTGROUPS_FILE=/app/data/portgroups.json
      - NOVNC_HOST=${NOVNC_HOST:-localhost}
      - NOVNC_PORT=${NOVNC_PORT:-6080}
      - LIBVIRT_VNC_HOST=${LIBVIRT_VNC_HOST:-127.0.0.1}
      - NOVNC_TOKEN_FILE=/app/data/novnc/tokens
    volumes:
      # Mount host libvirt socket so the container can manage VMs on the host
      - /var/run/libvirt/libvirt-sock:/var/run/libvirt/libvirt-sock
      # Mount host OVS control socket so ovs-vsctl commands reach host OVS
      - /var/run/openvswitch:/var/run/openvswitch
      # Mount host libvirt images directory so files written here (disk images, ISOs)
      # are visible to the host libvirt daemon at the same path
      - /var/lib/libvirt/images:/var/lib/libvirt/images
      # Persist only data files (SQLite DB, portgroups.json, backups)
      # DO NOT mount /app/backend — that would override the Python code from the image
      - cee_data:/app/data
    group_add:
      # Numeric GID of the libvirt group on the host — resolved by Ansible and written to .env
      - "${LIBVIRT_GID}"

  cee-novnc:
    build: .
    container_name: cee-novnc
    restart: unless-stopped
    network_mode: host
    command:
      - /bin/sh
      - -lc
      - mkdir -p /app/data/novnc && touch /app/data/novnc/tokens && exec websockify --web /usr/share/novnc/ --token-plugin TokenFile --token-source /app/data/novnc/tokens 6080
    environment:
      - NOVNC_PORT=${NOVNC_PORT:-6080}
      - NOVNC_TOKEN_FILE=/app/data/novnc/tokens
    volumes:
      - cee_data:/app/data

volumes:
  cee_data:
